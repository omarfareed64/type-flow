name: Deploy Angular app to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Configure runtime API
        env:
          TYPEFLOW_API_BASE_URL: ${{ vars.TYPEFLOW_API_BASE_URL }}
        run: |
          node -e "const fs = require('fs'); fs.writeFileSync('public/app-config.json', JSON.stringify({ apiBaseUrl: process.env.TYPEFLOW_API_BASE_URL || '' }, null, 2));"

      - name: Build for GitHub Pages
        run: npm run build -- --base-href /type-flow/

      - name: Add SPA fallback and disable Jekyll
        run: |
          cp dist/typeflow/browser/index.html dist/typeflow/browser/404.html
          touch dist/typeflow/browser/.nojekyll

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/typeflow/browser

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
